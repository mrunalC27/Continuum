services:
  - type: web
    name: continuum-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: USE_GROQ
        value: true
      - key: MOCK_MODE
        value: false
      - key: DB_PATH
        value: ./data/continuum.db